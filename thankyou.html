<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You - Kamal Creation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:
radial-gradient(circle at top,#3a2500 0%,#0b0b0b 35%,#000 100%);
color:white;
text-align:center;
padding:20px;
}

.box{
max-width:500px;
padding:45px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,0,.2);
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.45);
}

h1{
color:#FFD700;
font-size:40px;
margin-bottom:15px;
}

p{
line-height:1.8;
color:#ddd;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:14px 30px;
background:linear-gradient(135deg,#FFD700,#f7b500);
color:#111;
text-decoration:none;
border-radius:40px;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
}

</style>

</head>

<body>

<div class="box">

<h1>Thank You ❤️</h1>

<p>
Your order request has been received successfully.
<br><br>
Our team will contact you on WhatsApp shortly.
</p>

<a href="index.html" class="btn">
Back to Home
</a>

</div>

</body>
</html>
